# =============================================================================
# 军火库竞赛配置模板 (configs/template.yaml)
# 使用方法: python scripts/train_pipeline.py --config configs/template.yaml
# =============================================================================

# ------------------------------------------------------------
# 实验元信息
# ------------------------------------------------------------
experiment:
  name: "my_competition_v1"       # 实验名称（写入 report.json 和目录名）
  task: "binary"                  # 任务类型: binary | multiclass | regression
  seed: 42
  description: "baseline with LGBM+XGB stacking"

# ------------------------------------------------------------
# 数据配置
# ------------------------------------------------------------
data:
  train_path: "data/train.csv"    # 支持 .csv / .parquet / .feather
  test_path:  "data/test.csv"
  target_col: "target"            # 标签列名
  id_col:     "id"                # 提交文件 ID 列（可选，null 表示用行索引）
  parse_dates: []                 # 需要解析为 datetime 的列，如 ["date"]
  drop_cols:   []                 # 加载后立即删除的列

# ------------------------------------------------------------
# 交叉验证配置
# ------------------------------------------------------------
cv:
  strategy: "stratified_kfold"   # 可选：kfold | stratified_kfold |
                                 #        group_kfold | stratified_group_kfold |
                                 #        timeseries | purged_timeseries |
                                 #        user_group_kfold
  n_splits: 5
  shuffle:  true
  random_state: 42
  gap: 0                         # 时序切分专用：train/val 间隔
  group_col: null                # GroupKFold 专用：分组列名

# ------------------------------------------------------------
# 特征工程配置
# ------------------------------------------------------------
features:
  enable: true
  use_oof_transform: true        # true → fit_transform_oof（防泄露）
                                 # false → 普通 fit_transform

  transformers:
    # --- 时序特征 ---
    - type: TimeFeatureTransformer
      enabled: true
      params:
        date_col: "date"
        cyclic: ["month", "dayofweek", "hour"]

    # --- GroupBy 聚合特征 ---
    - type: GroupAggTransformer
      enabled: true
      params:
        group_keys: [["store_id"], ["store_id", "item_id"]]
        agg_cols: "sales"
        agg_funcs: ["mean", "std", "max", "min", "median"]

    # --- 差分特征 ---
    - type: DiffTransformer
      enabled: true
      params:
        value_cols: ["sales"]
        diff_periods: [1, 7, 28]
        rolling_windows: [7, 14, 28]
        rolling_funcs: ["mean", "std"]
        group_by: "item_id"
        sort_by: "date"

    # --- Lag 特征 ---
    - type: LagTransformer
      enabled: true
      params:
        value_cols: ["sales"]
        lags: [1, 7, 14, 28]
        group_by: "item_id"
        sort_by: "date"

    # --- 目标编码（强制折内防泄露）---
    - type: TargetEncoderTransformer
      enabled: false             # 结构化任务时开启
      params:
        cat_cols: ["store_id", "item_id", "dept_id"]
        smoothing: 20.0

    # --- 频率编码 ---
    - type: FreqEncoderTransformer
      enabled: false
      params:
        cat_cols: ["store_id", "item_id"]

# ------------------------------------------------------------
# 模型配置（支持多模型，可任意增减）
# ------------------------------------------------------------
models:
  # --- LightGBM ---
  - name: "lgbm"
    type: "LGBMModel"
    enabled: true
    num_boost_round: 1000
    early_stopping_rounds: 100
    log_period: 200
    fi_type: "gain"
    params:
      num_leaves: 63
      learning_rate: 0.05
      feature_fraction: 0.8
      bagging_fraction: 0.8
      bagging_freq: 1
      lambda_l1: 0.1
      lambda_l2: 0.1
      min_child_samples: 20

  # --- XGBoost ---
  - name: "xgb"
    type: "XGBModel"
    enabled: true
    num_boost_round: 1000
    early_stopping_rounds: 100
    log_period: 200
    fi_type: "total_gain"
    params:
      max_depth: 6
      eta: 0.05
      subsample: 0.8
      colsample_bytree: 0.8
      alpha: 0.1
      lambda: 1.0
      tree_method: "hist"

  # --- CatBoost ---
  - name: "catboost"
    type: "CatBoostModel"
    enabled: true
    iterations: 1000
    early_stopping_rounds: 100
    log_period: 200
    fi_type: "LossFunctionChange"
    params:
      depth: 6
      learning_rate: 0.05
      l2_leaf_reg: 3.0
      rsm: 0.8
      subsample: 0.8

  # --- BST（推荐：行为序列 Transformer）---
  # - name: "bst"
  #   type: "BSTModel"
  #   enabled: false
  #   seq_configs:
  #     - seq_col:     hist_item_id_list
  #       target_col:  item_id
  #       timegap_col: hist_timegap_list   # 可选
  #       maxlen:      50
  #   params:
  #     d_model: 64
  #     head_num: 4
  #     n_transformer_layers: 2
  #     hidden_size: 256
  #     dropout: 0.1
  #     batch_size: 2048
  #     patience: 5
  #   # ── 动态负采样（深度模型专属，BST / PLE 均支持）──────────────
  #   negative_sampling:
  #     enable:      false       # true → 每 Epoch 重采样负例
  #     neg_ratio:   4           # 正:负 ≈ 1:4（建议 2~10）
  #     buffer_size: 3           # 后台预取 Epoch 数（建议 2~5）
  #     n_workers:   1           # 后台采样线程数
  #     seed:        42

  # --- PLE（推荐：多任务 CTR/CVR）---
  # - name: "ple"
  #   type: "PLEModel"
  #   enabled: false
  #   params:
  #     n_levels: 2
  #     n_specific: 2
  #     n_shared: 2
  #     expert_units: [256, 128]
  #     tower_units:  [128, 64]
  #     batch_size:   2048
  #     patience:     5
  #   negative_sampling:
  #     enable:      false
  #     neg_ratio:   4
  #     buffer_size: 3
  #     n_workers:   1
  #     seed:        42

# ------------------------------------------------------------
# 超参数搜索配置（可选）
# ------------------------------------------------------------
tuning:
  enable: false                  # 开启后在正式训练前自动调参
  n_trials: 50
  timeout: 3600                  # 最长搜索秒数（null = 不限时）
  sampler: "tpe"
  pruner: "median"
  storage: null                  # "sqlite:///outputs/tuning.db" 开启持久化
  fit_best_at_end: false         # true → 调参后直接用最优参数做完整CV
  models_to_tune: ["lgbm"]       # 只对指定模型调参

# ------------------------------------------------------------
# 集成配置
# ------------------------------------------------------------
ensemble:
  enable: true
  method: "stacking"             # stacking（默认）| hill_climbing
  task: "binary"
  scale_meta_features: true
  passthrough: false             # true → 将原始特征追加到元特征矩阵
  clip_oof: false                # true → 对 OOF 做 1/99 百分位截断

  # ── Hill Climbing（Caruana Ensemble Selection）─────────────
  # 仅 method: "hill_climbing" 时生效；stacking 时可整块删除
  hill_climbing:
    n_iterations:        100     # 贪心迭代总轮数 T（建议 50~500）
    higher_is_better:    true    # True=最大化指标（AUC/Accuracy）；False=最小化（RMSE）
    random_shuffle_pct:  0.05    # 每轮随机扰动概率，防局部最优（0.0~0.1）
    n_bags:              5       # Bootstrap 袋数（别名：bagging_runs，二者等效）
    # bagging_runs:      5       # ← 与 n_bags 完全等效的语义别名
    bag_fraction:        1.0     # 每袋采样比例（有放回），1.0 = 全量
    seed:                42
    warm_start_with_best: true   # True → 以最优单模型为冷启动起点

# ------------------------------------------------------------
# 评估指标配置
# ------------------------------------------------------------
metrics:
  primary:
    name: "auc"
    func: "roc_auc_score"        # sklearn.metrics 中的函数名
    higher_is_better: true
    use_proba: true
  secondary:
    - name: "logloss"
      func: "log_loss"
      higher_is_better: false
      use_proba: true

# ------------------------------------------------------------
# 对抗性验证配置（Step 1.5，在数据加载后、特征工程前执行）
# ------------------------------------------------------------
adversarial_validation:
  enable: false                    # true → 自动在数据加载后执行

  # ── 判定阈值 ─────────────────────────────────────────────
  auc_threshold: 0.70              # 全特征 AUC 超过此值 → 判定存在分布偏移
  drop_threshold_auc: 0.65         # Stage 2：单特征 AUC 超过此值 → 建议剔除

  # ── 验证规模 ─────────────────────────────────────────────
  n_splits: 5                      # 对抗模型 CV 折数
  n_top_features: 30               # Stage 2 最多分析的可疑特征数

  # ── Stage 2：单特征精准诊断（慢，但更准确）──────────────
  compute_per_feature_auc: false   # true → 对 Top-N 特征逐一计算 AUC
  drop_threshold_importance: 0.01  # 归一化重要性 >= 此值才进入 Stage 2 分析

  # ── 剔除行为 ─────────────────────────────────────────────
  auto_drop: false                 # true → pipeline 自动剔除建议列
                                   # false → 仅输出报告，手动决定是否剔除

  # ── 排除列（ID 列、时间戳列等不应参与验证）──────────────
  ignore_cols: []                  # 示例: ["id", "date", "user_id"]

  # ── 覆盖 LightGBM 对抗模型参数（一般无需修改）──────────
  lgbm_params: {}
  seed: 42

# ------------------------------------------------------------
# 输出配置
# ------------------------------------------------------------
output:
  base_dir: "outputs"
  save_models: true
  save_oof: true
  save_feature_importance: true
  save_submission: true
  submission_col: "target"       # 提交文件的预测列名
